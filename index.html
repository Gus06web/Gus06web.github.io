<!DOCTYPE html>
<html>
<head>
    <title>Simulación Oficina Postal</title>
    <meta charset="utf-8">
</head>
<body>
<h1 style="font-family: Arial, Helvetica, sans-serif;">OFICINA POSTAL</h1>
<h2 style="font-family: Arial, sans-serif;">LLEGADAS</h2>
<p style="font-family: Arial, sans-serif;">Simulación de tiempos de espera</p>

<div style="display: flex; flex-wrap: wrap; gap: 30px; padding: 40px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-image: url('Background1.1.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            min-height: 90vh; 
            justify-content: center;">

    <div style="flex: 1; min-width: 300px; max-width: 360px; background-color: #c1c0c0; padding: 30px; border-radius: 12px; border: 1px solid #eaeaea; display: flex; flex-direction: column;">
        <h2 style="margin-top: 0; margin-bottom: 25px; font-size: 18px; font-weight: 500; color: #111111; letter-spacing: -0.5px;">Simulación</h2>
        
        <form style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px;">
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label for="nombre" style="font-size: 13px; font-weight: 500; color: #666666;">Empleados activos</label>
                <input type="number" id="nombre" name="nombre" placeholder="Ej. 3" value="5" style="padding: 10px 12px; border: 1px solid #e1e1e1; border-radius: 6px; font-size: 14px; color: #333; background-color: #fcfcfc; outline: none;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label for="tiempo" style="font-size: 13px; font-weight: 500; color: #666666;">Tiempo total (minutos)</label>
                <input type="number" id="tiempo" name="tiempo" placeholder="Ej. 480" value="480" style="padding: 10px 12px; border: 1px solid #e1e1e1; border-radius: 6px; font-size: 14px; color: #333; background-color: #fcfcfc; outline: none;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label for="numClientes" style="font-size: 13px; font-weight: 500; color: #666666;">Número de clientes totales</label>
                <input type="number" id="numClientes" name="numClientes" placeholder="Ej. 80" value="100" style="padding: 10px 12px; border: 1px solid #e1e1e1; border-radius: 6px; font-size: 14px; color: #333; background-color: #fcfcfc; outline: none;">
            </div>
        </form>

        <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px;">
            <input type="button" value="Calcular Parámetros" onclick="calcularOperacion()" style="width: 100%; padding: 11px; background-color: #111111; color: #ffffff; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer;">
            <input type="button" value="Exportar Reporte (PDF)" onclick="generarReporteEjecutivoPDF()" style="width: 100%; padding: 11px; background-color: #eaeaea; color: #000000; border: 1px solid #f2f2f2; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer;">
        </div>

        <div id="resultado" style="display: none; background-color: hsl(0, 0%, 89%); border: 1px solid #dad8d8; padding: 15px; border-radius: 6px; font-size: 13px; color: #444444; line-height: 1.6;">
            Esperando parámetros...
        </div>
    </div>

    <div style="flex: 2; min-width: 450px; max-width: 800px; background-color: #cfcfcf; padding: 30px; border-radius: 12px; border: 1px solid #eaeaea; display: flex; flex-direction: column; gap: 25px;">
        <h2 style="margin-top: 0; margin-bottom: 10px; font-size: 18px; font-weight: 500; color: #111111; letter-spacing: -0.5px;">Métricas de Sensibilidad y Rendimiento</h2>
        
        <div style="display: flex; flex-wrap: wrap; gap: 20px;">
            <div style="flex: 1; min-width: 220px; background: rgba(255,255,255,0.4); padding: 10px; border-radius: 8px;">
                <span style="display: block; text-align: center; font-size: 13px; color: #222; margin-bottom: 10px; font-weight: bold;">Clientes Esperando en Fila</span>
                <canvas id="graficaLq" style="max-height: 200px;"></canvas>
            </div>
            <div style="flex: 1; min-width: 220px; background: rgba(255,255,255,0.4); padding: 10px; border-radius: 8px;">
                <span style="display: block; text-align: center; font-size: 13px; color: #222; margin-bottom: 10px; font-weight: bold;">Ocupación de los Empleados (%)</span>
                <canvas id="graficaRho" style="max-height: 200px;"></canvas>
            </div>
        </div>
        <div style="max-width: 500px; margin: 0 auto; width: 100%; background: rgba(255,255,255,0.4); padding: 10px; border-radius: 8px;">
            <span style="display: block; text-align: center; font-size: 13px; color: #222; margin-bottom: 10px; font-weight: bold;">Tiempo Estimado de Espera</span>
            <canvas id="graficaWq" style="max-height: 200px;"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
let chartLq = null, chartRho = null, chartWq = null;
// Guardamos los valores calculados globalmente para evitar leer el HTML corrupto en el PDF
let globalLq = 0, globalRho = 0, globalWq = 0;

Chart.register(ChartDataLabels);

function calcularOperacion() {
    let Emple = parseInt(document.getElementById("nombre").value);
    let tiempo = parseFloat(document.getElementById("tiempo").value);
    let totalClientes = parseInt(document.getElementById("numClientes").value);
    let divResultado = document.getElementById("resultado");

    if (isNaN(Emple) || isNaN(tiempo) || isNaN(totalClientes) || Emple < 1 || tiempo <= 0 || totalClientes <= 0) {
        divResultado.style.display = "inline-block";
        divResultado.innerHTML = "<span style='color: #721c24;'><b>Error:</b> Por favor introduce valores numéricos mayores a cero.</span>";
        return;
    }

    let lambda = totalClientes / tiempo; 
    let mu = 0.1; 
    
    let r = lambda / mu; 
    let rhoActual = lambda / (Emple * mu);

    if (rhoActual >= 1) {
        divResultado.style.display = "inline-block";
        divResultado.innerHTML = "<span style='color: #721c24;'><b>Sistema Inestable:</b> Los empleados no dan abasto para la cantidad de clientes en ese tiempo. Incrementa los empleados o el tiempo de simulación.</span>";
        return;
    }

    let sumaSuma = 0.0;
    for (let n = 0; n < Emple; n++) {
        let factN = 1; for (let i = 1; i <= n; i++) { factN *= i; }
        sumaSuma += Math.pow(r, n) / factN;
    }
    let factS = 1; for (let i = 1; i <= Emple; i++) { factS *= i; }
    let p0 = 1.0 / (sumaSuma + (Math.pow(r, Emple) / (factS * (1.0 - rhoActual))));
    let lqActual = (p0 * Math.pow(r, Emple) * rhoActual) / (factS * Math.pow(1.0 - rhoActual, 2));
    let wqActual = lqActual / lambda; 

    // Almacenamos en las globales limpias
    globalLq = lqActual.toFixed(2);
    globalRho = (rhoActual * 100).toFixed(2);
    globalWq = wqActual.toFixed(2);

    divResultado.style.display = "inline-block";
    divResultado.innerHTML = 
        "<b>Resultados del Escenario Actual:</b><br>" +
        "• Promedio de clientes en fila: <b>" + globalLq + "</b> personas.<br>" +
        "• Uso promedio del personal: <b>" + globalRho + "%</b><br>" +
        "• Tiempo de espera promedio: <b>" + globalWq + "</b> minutos.";

    let labelsEmpleados = [];
    let datosLq = [];
    let datosWq = [];
    let coloresPuntos = [];
    let radiosPuntos = [];

    let minEmpleadosGrafica = Math.max(1, Math.ceil(r + 0.1)); 
    let maxEmpleadosGrafica = minEmpleadosGrafica + 4;

    for (let s = minEmpleadosGrafica; s <= maxEmpleadosGrafica; s++) {
        labelsEmpleados.push(s + " Empleados");
        let rhoG = lambda / (s * mu);
        
        let sumaG = 0.0;
        for (let n = 0; n < s; n++) {
            let factN = 1; for (let i = 1; i <= n; i++) { factN *= i; }
            sumaG += Math.pow(r, n) / factN;
        }
        let factSG = 1; for (let i = 1; i <= s; i++) { factSG *= i; }
        let p0G = 1.0 / (sumaG + (Math.pow(r, s) / (factSG * (1.0 - rhoG))));
        let lqG = (p0G * Math.pow(r, s) * rhoG) / (factSG * Math.pow(1.0 - rhoG, 2));
        
        datosLq.push(lqG.toFixed(2));
        datosWq.push((lqG / lambda).toFixed(2));

        if (s === Emple) {
            coloresPuntos.push("#2ecc71"); 
            radiosPuntos.push(8);                  
        } else {
            coloresPuntos.push("#e74c3c"); 
            radiosPuntos.push(4);
        }
    }

    if (chartLq) chartLq.destroy();
    if (chartRho) chartRho.destroy();
    if (chartWq) chartWq.destroy();

    // Gráfica 1: Clientes en Cola (Ajustado padding izquierdo para evitar cortes)
    chartLq = new Chart(document.getElementById('graficaLq'), {
        type: 'bar', 
        data: {
            labels: labelsEmpleados,
            datasets: [{
                label: 'Cantidad de Clientes',
                data: datosLq,
                backgroundColor: 'rgba(52, 152, 219, 0.7)', 
                borderColor: '#3498db',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: {
                padding: { left: 15, right: 10, top: 10, bottom: 10 }
            },
            scales: {
                x: { 
                    title: { display: true, text: 'Personal en Ventanilla', color: '#111', font: { weight: 'bold', size: 11 } }
                },
                y: { 
                    title: { display: true, text: 'Clientes en Fila', color: '#111', font: { weight: 'bold', size: 11 } }, 
                    beginAtZero: true
                }
            },
            plugins: {
                legend: { display: false },
                datalabels: { display: false }
            }
        }
    });

    let porcOcupado = (rhoActual * 100);
    let porcLibre = 100 - porcOcupado;

    // Gráfica 2: Ocupación
    chartRho = new Chart(document.getElementById('graficaRho'), {
        type: 'pie', 
        data: {
            labels: ['Tiempo Ocupados', 'Tiempo Libres'],
            datasets: [{
                data: [porcOcupado.toFixed(1), porcLibre.toFixed(1)],
                backgroundColor: ['#e74c3c', '#2ecc71'],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: 10 },
            plugins: {
                datalabels: {
                    display: true,
                    color: '#ffffff',
                    font: { weight: 'bold', size: 12 },
                    formatter: function(value) { return value + '%'; }
                }
            }
        }
    });

    // Gráfica 3: Tiempos de Espera (Ajustado padding izquierdo para evitar recortes)
    chartWq = new Chart(document.getElementById('graficaWq'), {
        type: 'line',
        data: {
            labels: labelsEmpleados,
            datasets: [{
                label: 'Tiempo en Minutos',
                data: datosWq,
                borderColor: '#e67e22',
                backgroundColor: 'rgba(230, 126, 34, 0.1)',
                fill: true,
                pointBackgroundColor: coloresPuntos,
                pointRadius: radiosPuntos,
                tension: 0.2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: {
                padding: { left: 15, right: 10, top: 10, bottom: 10 }
            },
            plugins: {
                legend: { display: false },
                datalabels: { display: false }
            },
            scales: {
                x: { title: { display: true, text: 'Personal en Ventanilla', color: '#111', font: { weight: 'bold', size: 11 } } },
                y: { title: { display: true, text: 'Minutos de Espera', color: '#111', font: { weight: 'bold', size: 11 } }, beginAtZero: true }
            }
        }
    });
}

async function generarReporteEjecutivoPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');

    let Emple = parseInt(document.getElementById("nombre").value);
    let tiempo = parseFloat(document.getElementById("tiempo").value);
    let totalClientes = parseInt(document.getElementById("numClientes").value);

    let canvasLq = document.getElementById('graficaLq');
    let canvasRho = document.getElementById('graficaRho');
    let canvasWq = document.getElementById('graficaWq');

    if (!canvasLq || !canvasRho || !canvasWq) {
        alert("Primero debes presionar 'Calcular Parámetros' para generar los datos antes de exportar.");
        return;
    }

    // Encabezado Azul
    doc.setFillColor(26, 54, 93);
    doc.rect(0, 0, 210, 32, 'F');

    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.text("REPORTE OPERATIVO DE SERVICIO Y CAPACIDAD", 15, 14);
    
    doc.setFont("helvetica", "italic");
    doc.setFontSize(10);
    doc.text("Análisis simplificado de atención para directivos y tomadores de decisiones.", 15, 23);

    // 1. Resumen Inicial
    doc.setTextColor(26, 54, 93);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.text("1. Resumen del Escenario Analizado:", 15, 45);

    doc.setTextColor(45, 55, 72);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text(`• Personal en ventanilla actualmente: ${Emple} empleados activos`, 20, 54);
    doc.text(`• Período de tiempo evaluado: ${tiempo} minutos de jornada comercial`, 20, 62);
    doc.text(`• Flujo total de visitantes esperados: ${totalClientes} clientes`, 20, 70);

    // 2. Desglose simplificado de Gráficas
    doc.setTextColor(26, 54, 93);
    doc.setFont("helvetica", "bold");
    doc.text("2. Desglose e Interpretación de Indicadores Visuales:", 15, 82);

    try {
        // Renderizar las capturas de las gráficas con escala alta para excelente nitidez
        const imgLq = await html2canvas(canvasLq, { scale: 2 });
        const imgRho = await html2canvas(canvasRho, { scale: 2 });
        const imgWq = await html2canvas(canvasWq, { scale: 2 });

        const dataLq = imgLq.toDataURL('image/png');
        const dataRho = imgRho.toDataURL('image/png');
        const dataWq = imgWq.toDataURL('image/png');

        // --- GRÁFICA A: Clientes en fila ---
        doc.setFontSize(11);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(45, 55, 72);
        doc.text("A) Clientes Esperando en Fila (Tamaño de la Cola)", 15, 93);
        doc.addImage(dataLq, 'PNG', 15, 96, 80, 50);

        // Bloque de información simplificado
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        let descLq = doc.splitTextToSize(
            "¿Qué representa?\n" +
            "Muestra cuántos clientes se acumularían físicamente en espera según el personal disponible.\n\n" +
            "A menor cantidad de barras o altura, menor es el riesgo de abandono en la sucursal.", 95
        );
        doc.text(descLq, 102, 106);

        // --- GRÁFICA B: Ocupación ---
        doc.setFontSize(11);
        doc.setFont("helvetica", "bold");
        doc.text("B) Porcentaje de Ocupación del Personal (Productividad)", 15, 155);
        doc.addImage(dataRho, 'PNG', 15, 158, 80, 50);

        // Bloque de información simplificado
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        let descRho = doc.splitTextToSize(
            "¿Qué representa?\n" +
            "Determina el uso real del tiempo del equipo de trabajo en las condiciones vigentes.\n\n", 95
        );
        doc.text(descRho, 102, 168);

        // --- NUEVA PÁGINA (PÁGINA 2) ---
        doc.addPage();
        
        // Encabezado para la página 2
        doc.setFillColor(26, 54, 93);
        doc.rect(0, 0, 210, 15, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(11);
        doc.text("CONTINUACIÓN DEL ANÁLISIS DE RENDIMIENTO", 15, 10);

        // --- GRÁFICA C: Tiempos de espera ---
        doc.setTextColor(45, 55, 72);
        doc.setFontSize(11);
        doc.text("C) Tiempo Estimado de Espera por Cliente (Experiencia del Usuario)", 15, 28);
        doc.addImage(dataWq, 'PNG', 15, 33, 85, 50);

        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        let descWq = doc.splitTextToSize(
            "¿Qué representa?\n" +
            "El promedio exacto de minutos que un usuario permanece en la fila antes de ser atendido.\n\n" +
            "El punto verde destaca la operación actual. Los puntos rojos ilustran cómo decrecen los tiempos añadiendo más ventanillas.", 95
        );
        doc.text(descWq, 105, 45);


        // Pie de página administrativo fijo
        doc.setDrawColor(226, 232, 240);
        doc.line(15, 275, 195, 275);
        doc.setTextColor(148, 163, 184);
        doc.setFont("helvetica", "italic");
        doc.setFontSize(8);
        doc.text("Glosario administrativo de soporte - Documentación confidencial de planeación de infraestructura comercial.", 105, 282, { align: "center" });

        doc.save(`Reporte_Simplificado_Postal_${Date.now()}.pdf`);
    } catch (error) {
        console.error(error);
        alert("Ocurrió un inconveniente al generar los vectores del PDF.");
    }
}
</script>
</body>
</html>
